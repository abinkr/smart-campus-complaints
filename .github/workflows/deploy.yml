name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install NLP dependencies
        working-directory: nlp-service
        run: pip install -r requirements.txt

      - name: Compile NLP service
        working-directory: nlp-service
        run: python -m py_compile app.py classifier.py train_model.py

  docker:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-backend:latest

      - name: Build and push NLP service
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: nlp-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-nlp:latest

      - name: Trigger Render backend deploy
        if: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger Render NLP deploy
        if: ${{ secrets.RENDER_NLP_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_NLP_DEPLOY_HOOK }}"
